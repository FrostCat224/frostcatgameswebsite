<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Calculator</title>

<link href="https://frostcat224.github.io/frostcatgameswebsite/style.css" rel="stylesheet">

<style>
main {
    padding: 20px;
}

input, button {
    padding: 10px;
    font-size: 16px;
    margin-right: 5px;
}

#output {
    white-space: pre-wrap;
    font-family: Verdana, Arial, sans-serif;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
<img src="https://frostcat224.github.io/frostcatgameswebsite/img/textlogo.png">

<nav>
    <a href="https://frostcat224.github.io/frostcatgameswebsite/">Home</a>
    <a href="https://frostcat224.github.io/frostcatgameswebsite/stuff">Stuff</a>
    <a href="https://frostcat224.github.io/frostcatgameswebsite/archive">Archive</a>
    <a href="https://frostcat224.github.io/frostcatgameswebsite/info">Info</a>
    <a href="https://frostcat224.github.io/frostcatgameswebsite/search">Search</a>
</nav>
</header>

<main>
<h1>Element Calculator</h1>

<input id="input" placeholder="Type element name">
<button onclick="search()">Search</button>

<pre id="output">Loading...</pre>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDFH5CJJRdNrBcA8h8zfks-9mCxo-vxt0",
    authDomain: "elementalquadrillion.firebaseapp.com",
    databaseURL: "https://elementalquadrillion-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "elementalquadrillion",
    storageBucket: "elementalquadrillion.firebasestorage.app",
    messagingSenderId: "828897871116",
    appId: "1:828897871116:web:8e05949030ca774ce5f529"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let elMap = {};
let combinations = {};

const output = document.getElementById("output");

// ---------- helpers ----------
function getName(id) {
    return elMap[id]?.name || `Unknown(${id})`;
}

function getIdByName(name) {
    name = name.toLowerCase();
    for (const id in elMap) {
        if ((elMap[id].name || "").toLowerCase() === name) {
            return Number(id);
        }
    }
    return null;
}

// ---------- combo lookup (supports reversed keys) ----------
function getCombination(a, b) {
    const k1 = `${a}_${b}`;
    const k2 = `${b}_${a}`;
    return combinations[k1] ?? combinations[k2];
}

// ---------- MAIN FORWARD SIMULATION ----------
function findRecipe(targetId) {
    const starters = [1, 2, 3, 4];

    let discovered = new Set(starters);

    // stores: resultId -> {a, b}
    let recipeMap = {};

    let changed = true;

    while (changed) {
        changed = false;

        const current = Array.from(discovered);

        for (const a of current) {
            for (const b of current) {

                const result = getCombination(a, b);

                if (result !== undefined && !discovered.has(result)) {

                    discovered.add(result);
                    recipeMap[result] = { a, b };
                    changed = true;

                    if (result === targetId) {
                        return { recipeMap, targetId };
                    }
                }
            }
        }
    }

    return null;
}

// ---------- BUILD HUMAN-READABLE CHAIN ----------
function buildChain(id, recipeMap) {
    if (id <= 4) return [getName(id)];

    const recipe = recipeMap[id];
    if (!recipe) return [getName(id)];

    const left = buildChain(recipe.a, recipeMap);
    const right = buildChain(recipe.b, recipeMap);

    return [...left, "+", ...right, "=", getName(id)];
}

// ---------- SEARCH ----------
window.search = function () {

    const input = document.getElementById("input").value.trim();
    const targetId = getIdByName(input);

    if (!targetId) {
        output.textContent = "Error";
        return;
    }

    const result = findRecipe(targetId);

    if (!result) {
        output.textContent = "Error (no route found)";
        return;
    }

    const chain = buildChain(result.targetId, result.recipeMap);

    let lines = [];
    let buffer = [];

    for (const token of chain) {
        buffer.push(token);

        if (token === getName(result.targetId)) {
            lines.push(buffer.join(" "));
            buffer = [];
        }
    }

    output.textContent =
        "Fastest crafting route:\n\n" +
        lines.join("\n");
};

// ---------- LOAD FIREBASE ----------
onValue(ref(db), (snapshot) => {

    const data = snapshot.val();

    const elements = Object.values(data.elements || {});
    combinations = data.combinations || {};

    elMap = {
        1: { name: "Air" },
        2: { name: "Earth" },
        3: { name: "Fire" },
        4: { name: "Water" }
    };

    for (const e of elements) {
        if (e?.id) elMap[e.id] = e;
    }

    output.textContent = "Type an element name.";
});
</script> 

</body>
</html>
