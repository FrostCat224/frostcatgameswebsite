<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostCatGames</title>
    <link href="https://frostcat224.github.io/frostcatgameswebsite/style.css" rel="stylesheet" type="text/css" media="all">

    <style>
    </style>
</head>
    
<body>
    <header>
    <img src="https://frostcat224.github.io/frostcatgameswebsite/img/textlogo.png" alt="FrostCatGames">

    <nav>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/">Home</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/stuff">Stuff</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/archive">Archive</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/info">Info</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/search">Search</a>
    </nav>
    </header>

    
<main>
    <h1>Image Resizer</h1>

    <input type="file" id="imageInput" accept="image/*"><br><br>

    <label>Keep aspect ratio</label>
    <input type="checkbox" id="lockRatio" checked><br><br>

    <label>Width:</label>
    <input type="number" id="width" value="300"><br><br>

    <label>Height:</label>
    <input type="number" id="height" value="300"><br><br>

    <button onclick="resizeImage()">Resize</button>

    <br><br>

    <canvas id="canvas"></canvas>

    <br><br>

    <a id="downloadLink" style="display:none;" download="resized-image.png">
        Download resized image
    </a>
</main>

<script>
let originalWidth = 0;
let originalHeight = 0;
let aspectRatio = 1;
let imgLoaded = false;

const widthInput = document.getElementById("width");
const heightInput = document.getElementById("height");
const lockRatio = document.getElementById("lockRatio");

document.getElementById("imageInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const img = new Image();
    const reader = new FileReader();

    reader.onload = function (e) {
        img.src = e.target.result;
    };

    img.onload = function () {
        originalWidth = img.width;
        originalHeight = img.height;
        aspectRatio = img.width / img.height;
        imgLoaded = true;

        widthInput.value = img.width;
        heightInput.value = img.height;
    };

    reader.readAsDataURL(file);
});


widthInput.addEventListener("input", () => {
    if (!imgLoaded || !lockRatio.checked) return;
    heightInput.value = Math.round(widthInput.value / aspectRatio);
});

heightInput.addEventListener("input", () => {
    if (!imgLoaded || !lockRatio.checked) return;
    widthInput.value = Math.round(heightInput.value * aspectRatio);
});

function resizeImage() {
    const file = document.getElementById("imageInput").files[0];
    if (!file) {
        alert("Please select an image first.");
        return;
    }

    const width = parseInt(widthInput.value);
    const height = parseInt(heightInput.value);

    const img = new Image();
    const reader = new FileReader();

    reader.onload = function (e) {
        img.src = e.target.result;
    };

    img.onload = function () {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = width;
        canvas.height = height;

        ctx.drawImage(img, 0, 0, width, height);

        const downloadLink = document.getElementById("downloadLink");
        downloadLink.href = canvas.toDataURL("image/png");
        downloadLink.style.display = "inline";
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
