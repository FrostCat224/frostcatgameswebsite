<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostCatGames</title>
    <link href="https://frostcat224.github.io/frostcatgameswebsite/style.css" rel="stylesheet" type="text/css" media="all">

    <style>
    </style>
</head>
    
<body>
    <header>
    <img src="https://frostcat224.github.io/frostcatgameswebsite/img/textlogo.png" alt="FrostCatGames">

    <nav>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/">Home</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/stuff">Stuff</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/archive">Archive</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/info">Info</a>
        <a href="https://frostcat224.github.io/frostcatgameswebsite/search">Search</a>
    </nav>
    </header>

    
<main>
  <h1>Search</h1>
  <p></p>
   <input
id="search"
type="text"
placeholder="Search..."
oninput="searchItems()">

<div id="results"></div>

<script>

let items=[];

fetch("https://frostcat224.github.io/frostcatgameswebsite/search/search.json")
.then(r=>r.json())
.then(data=>{
    items=data;
});

function searchItems(){

    let q=document
        .getElementById("search")
        .value
        .toLowerCase();

    let results=
        document.getElementById("results");

    results.innerHTML="";

    if(q==="") return;

    items
    .filter(i=>
        i.name.toLowerCase().includes(q)
    )
    .sort((a,b)=>{

        let aName=a.name.toLowerCase();
        let bName=b.name.toLowerCase();

        let aStarts=aName.startsWith(q);
        let bStarts=bName.startsWith(q);

        if(aStarts && !bStarts) return -1;
        if(!aStarts && bStarts) return 1;

        return aName.indexOf(q)-bName.indexOf(q);

    })
    .forEach(i=>{

        let a=document.createElement("a");

        a.className="result";
        a.href=i.link;

        a.textContent=i.name;

        a.style.display="block";
        a.style.marginBottom="10px";

        results.appendChild(a);

    });

}

</script>
</main>

</body>
</html>
