// ---------------- PARSE LUA ----------------
function parseLua(luaText) {
  const result = {};
  const regex = /\["([\s\S]*?)\"\]\s*=\s*"([\s\S]*?)"/g;

  let match;
  while ((match = regex.exec(luaText)) !== null) {
    result[match[1]] = match[2];
  }
  return result;
}

// ---------------- BUILD STRUCTURE ----------------
const rawData = parseLua(luaData);

const elements = new Set();
const childrenMap = {};

for (const key in rawData) {
  const result = rawData[key];

  const [p1, p2] = key.split("|").map(s => s.trim());

  elements.add(p1);
  elements.add(p2);
  elements.add(result);

  [p1, p2].forEach(parent => {
    if (!childrenMap[parent]) childrenMap[parent] = [];
    childrenMap[parent].push(result);
  });
}

// ---------------- FIND ROOTS ----------------
const resultsSet = new Set(Object.values(rawData));
const baseElements = [
  "Fire",
  "Air",
  "Water",
  "Earth",
  "Science",
  "Emptiness"
];

// ---------------- RENDER ----------------
const treeContainer = document.getElementById('tree');

function renderBase() {
  treeContainer.innerHTML = "";
  baseElements.forEach(el => {
    treeContainer.appendChild(createNode(el));
  });
}

function createNode(name) {
  const li = document.createElement('li');
  li.textContent = name;
  li.dataset.name = name;
  li.addEventListener('click', toggleChildren);
  return li;
}

function toggleChildren(event) {
  event.stopPropagation();
  const li = event.currentTarget;
  const name = li.dataset.name;

  const existing = li.querySelector('ul');
  if (existing) {
    li.removeChild(existing);
    return;
  }

  const children = childrenMap[name];
  if (!children) return;

  const ul = document.createElement('ul');

  [...new Set(children)].forEach(child => {
    ul.appendChild(createNode(child));
  });

  li.appendChild(ul);
}

// ---------------- SEARCH ----------------
document.getElementById('search').addEventListener('input', function() {
  const query = this.value.toLowerCase();
  treeContainer.innerHTML = "";

  if (!query) {
    renderBase();
    return;
  }

  [...elements].forEach(el => {
    if (el.toLowerCase().includes(query)) {
      treeContainer.appendChild(createNode(el));
    }
  });
});

// ---------------- AUTO LOAD ----------------
renderBase();
