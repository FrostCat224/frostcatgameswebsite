<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Elemental Qaudrillion</title>

<style>

*{
box-sizing:border-box;
font-family:Verdana;
}

body{
margin:0;
background:#e8e8e8;
height:100vh;
display:flex;
overflow:hidden;
}

#left{
flex:1;
background:#f4f4f4;
padding:16px;
overflow-y:auto;
border-right:2px solid #ddd;
min-width:0;
}

#news{
width:340px;
background:#fafafa;
border-left:2px solid #ddd;
overflow-y:auto;
padding:16px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:18px;
}

#elements{

display:flex;

flex-wrap:wrap;

gap:14px;

}

.element{

width:85px;

height:85px;

border-radius:16px;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

position:relative;

cursor:grab;

user-select:none;

color:white;

font-weight:bold;

transition:.15s;

}

.element:hover{

transform:scale(1.03);

}

.elementName{
font-size:14px;
text-align:center;
padding:0 6px;
}

.elementId{
right:8px;
bottom:6px;
font-size:11px;
}

.dragClone{

position:fixed;

pointer-events:none;

opacity:.85;

z-index:999;

transform:translate(-50%,-50%);

}

.newsEntry{

padding:10px;

margin-bottom:10px;

border:2px solid #ddd;

background:white;

}

.newsCombo{

font-size:16px;

margin-bottom:8px;

}

.newsDate{

color:#777;

font-size:13px;

}

.popup{

position:fixed;

left:50%;

top:50%;

transform:translate(-50%,-50%);

background:white;

padding:20px;

border:3px solid black;

width:420px;

z-index:1000;

display:none;

}

.popup input{

width:100%;

padding:10px;

margin-top:10px;

}

.slider{

width:100%;

}

button{

padding:10px;

margin-top:10px;

cursor:pointer;

}

.preview{

width:100%;

height:70px;

margin-top:10px;

}

</style>

</head>

<body>

<div id="left">

<div class="title">
Your Elements
</div>

<div id="elements"></div>

</div>



<div id="news">

<div class="title">
NEWS
</div>

<div id="newsList"></div>

</div>

<div class="popup" id="popup">

<h2 id="comboText">
???
</h2>

<input
id="newName"
placeholder="Element name"
>

<div id="colorSection">

Hue

<input
class="slider"
type="range"
min="0"
max="360"
value="0"
id="hue"
>

Saturation

<input
class="slider"
type="range"
min="0"
max="100"
value="80"
id="sat"
>

Value

<input
class="slider"
type="range"
min="0"
max="100"
value="90"
id="val"
>

<div
class="preview"
id="preview"
></div>

</div>

<button onclick="finishCreate()">
Done
</button>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getDatabase,

ref,

get,

set,

push,

onValue

}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFH5CJJR-dNrBcA8h8zfks-9mCxo-vxt0",
  authDomain: "elementalquadrillion.firebaseapp.com",
  databaseURL: "https://elementalquadrillion-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "elementalquadrillion",
  storageBucket: "elementalquadrillion.firebasestorage.app",
  messagingSenderId: "828897871116",
  appId: "1:828897871116:web:8e05949030ca774ce5f529"
};

const app=
initializeApp(
firebaseConfig
);

const db=
getDatabase(
app
);

const START=[

{
id:1,
name:"Air",
color:"#dddddd"
},

{
id:2,
name:"Earth",
color:"#a3501c"
},

{
id:3,
name:"Fire",
color:"#ff6b39"
},

{
id:4,
name:"Water",
color:"#3f88ff"
}

];

let owned=
JSON.parse(
localStorage.getItem(
"ownedElements"
)
);

if(!owned){

owned=[1,2,3,4];

localStorage.setItem(
"ownedElements",
JSON.stringify(owned)
);

}

let elements={};

let dragging=null;

let clone=null;

let combineA=null;

let combineB=null;

let pendingColor=null;

let pendingA=null;

let pendingB=null;

let nextId=5;
function getTextColor(hex){

const c=
hex.replace("#","");

const r=
parseInt(c.slice(0,2),16);

const g=
parseInt(c.slice(2,4),16);

const b=
parseInt(c.slice(4,6),16);

const brightness=
(r*299 + g*587 + b*114)/1000;

return brightness>140
? "#000"
: "#fff";

}
  async function loadElements(){

const snap=
await get(
ref(
db,
"elements"
)
);

elements={};

START.forEach(e=>{

elements[e.id]=e;

});

if(snap.exists()){

Object.assign(
elements,
snap.val()
);

}



renderElements();

}

function saveOwned(){

localStorage.setItem(

"ownedElements",

JSON.stringify(
owned
)

);

}

function renderElements(){

const wrap=

document.getElementById(
"elements"
);

wrap.innerHTML="";

const list=

Object.values(elements)

.filter(

e=>

owned.includes(
e.id
)

)

.sort(

(a,b)=>

hexHue(a.color)-hexHue(b.color)

);

list.forEach(

element=>{

const div=

document.createElement(
"div"
);

div.className=
"element";

div.style.background=
element.color;
  
div.style.color=
getTextColor(
element.color
);

div.dataset.id=
element.id;

div.innerHTML=`

<div class="elementName">

${element.name}

</div>

<div class="elementId">

#${element.id}

</div>

`;

div.onmousedown=
e=>
startDrag(
e,
element
);

wrap.appendChild(
div
);

}

);

}

function hexHue(hex){

const c=

hex.replace(
"#",
""
);

const r=
parseInt(
c.slice(0,2),
16
);

const g=
parseInt(
c.slice(2,4),
16
);

const b=
parseInt(
c.slice(4,6),
16
);

const max=
Math.max(
r,
g,
b
);

const min=
Math.min(
r,
g,
b
);

if(max===min)
return 0;

let h;

if(max===r){

h=
60*
(
(g-b)
/(max-min)
);

}

else if(max===g){

h=
60*
(
2+
(
b-r
)
/(max-min)
);

}

else{

h=
60*
(
4+
(
r-g
)
/(max-min)
);

}

return h<0
?
h+360
:
h;

}

function startDrag(
e,
element
){

dragging=
element;

combineA=
element;

clone=

document.createElement(
"div"
);

clone.className=

"element dragClone";

clone.style.background=

element.color;
  clone.style.color = getTextColor(element.color);
  

clone.innerHTML=`

<div class="elementName">

${element.name}

</div>

<div class="elementId">

#${element.id}

</div>

`;

document.body.appendChild(
clone
);

moveClone(
e
);

document.addEventListener(
"mousemove",
moveClone
);

document.addEventListener(
"mouseup",
stopDrag
);

}

function moveClone(
e
){

if(!clone)
return;

clone.style.left=

e.clientX+"px";

clone.style.top=

e.clientY+"px";

}

async function stopDrag(
e
){

document.removeEventListener(
"mousemove",
moveClone
);

document.removeEventListener(
"mouseup",
stopDrag
);

if(clone){

clone.remove();

clone=null;

}

const target=

document.elementFromPoint(

e.clientX,

e.clientY

);

const card=

target?.closest(
".element"
);

if(

card

&&

dragging

){

combineB=

elements[
card.dataset.id
];

await combine();

}

dragging=null;

}

  async function combine(){

if(
!combineA
||
!combineB
)
return;

const ids=[

Number(combineA.id),

Number(combineB.id)

]

.sort(
(a,b)=>a-b
);

const combo=

ids.join(
"_"
);

const comboSnap=

await get(

ref(
db,
"combinations/"+combo
)

);

if(
comboSnap.exists()
){

const resultId=

comboSnap.val();

if(
!owned.includes(
resultId
)
){

owned.push(
resultId
);

saveOwned();

renderElements();

}

return;

}

pendingA=
combineA;

pendingB=
combineB;

document.getElementById(
"comboText"
).innerText=

`${combineA.name} + ${combineB.name} = ???`;

document.getElementById(
"popup"
).style.display=
"block";

document.getElementById(
"newName"
).value="";

document.getElementById(
"colorSection"
).style.display=
"block";

updatePreview();

}

function hsvToHex(
h,
s,
v
){

s/=100;

v/=100;

let c=
v*s;

let x=
c*
(
1-
Math.abs(
(
h/60
)%2
-1
)
);

let m=
v-c;

let r=0;
let g=0;
let b=0;

if(h<60){
r=c;
g=x;
}

else if(h<120){
r=x;
g=c;
}

else if(h<180){
g=c;
b=x;
}

else if(h<240){
g=x;
b=c;
}

else if(h<300){
r=x;
b=c;
}

else{
r=c;
b=x;
}

r=
Math.round(
(r+m)*255
);

g=
Math.round(
(g+m)*255
);

b=
Math.round(
(b+m)*255
);

return "#"+

[r,g,b]

.map(

v=>

v
.toString(
16
)
.padStart(
2,
"0"
)

)

.join("");

}

function updatePreview(){

pendingColor=

hsvToHex(

Number(
hue.value
),

Number(
sat.value
),

Number(
val.value
)

);

preview.style.background=

pendingColor;

}

hue.oninput=
updatePreview;

sat.oninput=
updatePreview;

val.oninput=
updatePreview;

async function finishCreate(){

const name=

document
.getElementById(
"newName"
)
.value
.trim();

if(
!name
)
return;

const id=
nextId++;

const obj={

id,

name,

color:
pendingColor,

date:
Date.now(),

combinations:[

{

a:
pendingA.id,

b:
pendingB.id

}

]

};

await set(

ref(
db,
"elements/"+id
),

obj

);

const combo=[

pendingA.id,

pendingB.id

]

.sort(
(a,b)=>a-b
)

.join("_");

await set(

ref(
db,
"combinations/"+combo
),

id

);

await push(

ref(
db,
"news"
),

{

a:
pendingA.id,

b:
pendingB.id,

result:
id,

date:
Date.now()

}

);

elements[id]=obj;

owned.push(
id
);

saveOwned();

renderElements();

popup.style.display=
"none";

}

async function updateNextId(){

const snap=

await get(

ref(
db,
"elements"
)

);

if(
!snap.exists()
){

nextId=5;

return;

}

const ids=

Object.keys(

snap.val()

)

.map(
Number
);

nextId=

Math.max(
...ids
)+1;

}

  function cubeHTML(
element
){

return `

<div
class="element"
style="

width:90px;

height:90px;

background:${element.color};

pointer-events:none;

"

>

<div
class="elementName"
>

${element.name}

</div>

<div
class="elementId"
>

#${element.id}

</div>

</div>

`;

}

function formatDate(
time
){

const d=
new Date(
time
);

return d.toLocaleString();

}

function renderNews(
news
){

const wrap=

document.getElementById(
"newsList"
);

wrap.innerHTML="";

news

.sort(
(a,b)=>
b.date-a.date
)

.slice(
0,
20
)

.forEach(

entry=>{

const a=

elements[
entry.a
];

const b=

elements[
entry.b
];

const result=

elements[
entry.result
];

if(

!a

||

!b

||

!result

)

return;

const div=

document.createElement(
"div"
);

div.className=

"newsEntry";

div.innerHTML=`

<div class="newsCombo">

${a.name}

+

${b.name}

=

</div>

${cubeHTML(
result
)}

<div class="newsDate">

${formatDate(
entry.date
)}

</div>

`;

wrap.appendChild(
div);

}

);

}

function listenNews(){

onValue(

ref(
db,
"news"
),

snap=>{

if(
!snap.exists()
){

renderNews([]);

return;

}

renderNews(

Object.values(

snap.val()

)

);

}

);

}

async function init(){

await loadElements();

await updateNextId();

listenNews();

}

init();

window.finishCreate=
finishCreate;

window.updatePreview=
updatePreview;

</script>

</body>

</html>
