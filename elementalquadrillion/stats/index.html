    <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Element Stats (Live Firebase)</title>
</head>
<body>

<h1>Elemental Quadrillion Stats </h1>
<pre id="output">Loading...</pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyDFH5CJJR-dNrBcA8h8zfks-9mCxo-vxt0",
  authDomain: "elementalquadrillion.firebaseapp.com",
  databaseURL: "https://elementalquadrillion-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "elementalquadrillion",
  storageBucket: "elementalquadrillion.firebasestorage.app",
  messagingSenderId: "828897871116",
  appId: "1:828897871116:web:8e05949030ca774ce5f529"
};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const output = document.getElementById("output");

onValue(ref(db), (snapshot) => {
  const data = snapshot.val();

  if (!data) {
    output.textContent = "No data found.";
    return;
  }

  const elements = data.elements || [];
  const news = data.news || {};

  const elMap = {};
  elements.forEach(e => { if (e) elMap[e.id] = e; });

  let newest = null;
  for (const e of elements) {
    if (!e) continue;
    if (!newest || e.date > newest.date) newest = e;
  }

  const elementCount = elements.filter(Boolean).length;
  const recipeCount = Object.keys(news).length;

  const bytes = new Blob([JSON.stringify(data)]).size;

  function formatSize(b) {
    if (b < 1024) return b + " bytes";
    if (b < 1024**2) return (b/1024).toFixed(2) + " KB";
    if (b < 1024**3) return (b/1024/1024).toFixed(2) + " MB";
    return (b/1024/1024/1024).toFixed(2) + " GB";
  }

  const resultCount = {};
  const usedCount = {};

  for (const id in news) {
    const r = news[id].result;
    const a = news[id].a;
    const b = news[id].b;

    resultCount[r] = (resultCount[r] || 0) + 1;
    usedCount[a] = (usedCount[a] || 0) + 1;
    usedCount[b] = (usedCount[b] || 0) + 1;
  }

  function maxKey(map) {
    let best = null;
    let bestVal = -1;

    for (const k in map) {
      if (map[k] > bestVal) {
        best = k;
        bestVal = map[k];
      }
    }
    return { id: best, count: bestVal };
  }

  const mostCreated = maxKey(resultCount);
  const mostUsed = maxKey(usedCount);

  const depthMemo = {};

  function getDepth(id) {
    if (depthMemo[id] !== undefined) return depthMemo[id];

    let incoming = [];
    for (const r in news) {
      if (news[r].result === Number(id)) {
        incoming.push(news[r]);
      }
    }

    if (incoming.length === 0) {
      depthMemo[id] = 0;
      return 0;
    }

    let max = 0;
    for (const rec of incoming) {
      const d = 1 + Math.max(getDepth(rec.a), getDepth(rec.b));
      if (d > max) max = d;
    }

    depthMemo[id] = max;
    return max;
  }

  let deepest = { id: null, depth: -1 };

  for (const e of elements) {
    if (!e) continue;
    const d = getDepth(e.id);
    if (d > deepest.depth) {
      deepest = { id: e.id, depth: d };
    }
  }

  const name = (id) => elMap[id]?.name || "Unknown";

  output.textContent =
`Newest element:
${newest?.name || "None"} (ID ${newest?.id})

Number of elements:
${elementCount}

Number of recipes:
${recipeCount}

Database size:
${formatSize(bytes)}

Element with the most recipes:
${name(mostCreated.id)} (${mostCreated.count})

Element used in most recipes:
${name(mostUsed.id)} (${mostUsed.count})

Deepest element:
${name(deepest.id)} (depth ${deepest.depth})
`;

});
</script>
