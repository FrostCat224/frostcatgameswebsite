<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Element Evolution Timeline</title>

<style>
body {
    margin: 0;
    font-family: Verdana;
    background: #0f0f0f;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

#left {
    flex: 1;
    padding: 16px;
    overflow: auto;
}

#right {
    width: 320px;
    border-left: 2px solid #333;
    padding: 16px;
    overflow: auto;
    background: #151515;
}

.title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.node {
    margin-left: 18px;
    margin-top: 6px;
}

.element {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 8px;
    margin: 4px;
    font-size: 13px;
    font-weight: bold;
}

.line {
    border-left: 1px solid #444;
    margin-left: 10px;
    padding-left: 10px;
}
</style>
</head>

<body>

<div id="left">
    <div class="title">🌳 Element Evolution Tree</div>
    <div id="tree"></div>
</div>

<div id="right">
    <div class="title">⏱ Virtual Time</div>
    <div id="time"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

// ================= FIREBASE =================

const firebaseConfig = {
  apiKey: "AIzaSyDFH5CJJR-dNrBcA8h8zfks-9mCxo-vxt0",
  authDomain: "elementalquadrillion.firebaseapp.com",
  databaseURL: "https://elementalquadrillion-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "elementalquadrillion",
  storageBucket: "elementalquadrillion.firebasestorage.app",
  messagingSenderId: "828897871116",
  appId: "1:828897871116:web:8e05949030ca774ce5f529"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= TIME SYSTEM =================

const startTime = new Date("2026-06-26T00:00:00");
let virtualMinutes = 0;

setInterval(() => {
    virtualMinutes++;
    updateTime();
    render();
}, 1000);

function getVirtualTime() {
    return new Date(startTime.getTime() + virtualMinutes * 60000);
}

// ================= DATA =================

let elements = {};
let combinations = {};

// ================= FIREBASE LISTENERS =================

onValue(ref(db, "elements"), snap => {
    elements = snap.val() || {};
    render();
});

onValue(ref(db, "combinations"), snap => {
    combinations = snap.val() || {};
    render();
});

// ================= BASE ELEMENTS =================

const BASE_IDS = [1,2,3,4];

// ================= VISIBILITY RULE =================

function isVisible(e) {
    if (!e) return false;

    const now = getVirtualTime().getTime();

    if (!e.date) return BASE_IDS.includes(e.id);

    return e.date <= now;
}

// ================= TREE LOGIC =================

function buildTree() {
    const map = {};
    const unlocked = Object.values(elements).filter(isVisible);

    // only visible elements exist in map
    unlocked.forEach(e => {
        map[e.id] = { ...e, children: [] };
    });

    const roots = [];

    // connect using combinations
    for (const key in combinations) {
        const [a, b] = key.split("_").map(Number);
        const resultId = combinations[key];

        if (map[a] && map[b] && map[resultId]) {
            map[a].children.push(map[resultId]);
            map[b].children.push(map[resultId]);
        }
    }

    // roots = base elements only
    unlocked.forEach(e => {
        if (BASE_IDS.includes(e.id)) {
            roots.push(map[e.id]);
        }
    });

    return roots;
}

// ================= RENDER =================

function renderNode(node, visited = new Set()) {
    if (!node || visited.has(node.id)) return "";
    visited.add(node.id);

    let html = `<div class="node">`;

    html += `<div class="element" style="background:${node.color || '#555'}">${node.name}</div>`;

    if (node.children.length > 0) {
        html += `<div class="line">`;
        node.children.forEach(c => {
            html += renderNode(c, visited);
        });
        html += `</div>`;
    }

    html += `</div>`;
    return html;
}

function render() {
    const tree = buildTree();
    document.getElementById("tree").innerHTML =
        tree.map(t => renderNode(t)).join("");
}

// ================= TIME UI =================

function updateTime() {
    const now = getVirtualTime();
    document.getElementById("time").innerText = now.toString();
}

updateTime();
render();

</script>

</body>
</html>
